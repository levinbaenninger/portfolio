name: CI

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"

env:
  NODE_VERSION: "lts/*"
  PNPM_VERSION: 10

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has-source-changes: ${{ steps.changes.outputs.source }}
      has-deps-changes: ${{ steps.changes.outputs.deps }}
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Check for changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            source:
              - 'src/**'
              - 'public/**'
              - '*.config.*'
              - 'package.json'
            deps:
              - 'package.json'
              - 'pnpm-lock.yaml'

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏗️ Build Application
        if: steps.changes.outputs.source == 'true'
        run: |
          echo "Starting Next.js build..."
          pnpm build
          echo "Build completed successfully ✅"
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 🔍 Debug build output
        if: steps.changes.outputs.source == 'true'
        run: |
          echo "Checking if .next directory exists..."
          ls -la
          if [ -d ".next" ]; then
            echo "✅ .next directory found"
            ls -la .next/
          else
            echo "❌ .next directory not found"
          fi
          echo "Checking public directory..."
          if [ -d "public" ]; then
            echo "✅ public directory found"
            ls -la public/
          else
            echo "❌ public directory not found"
          fi

      - name: 💾 Cache Next.js build
        if: steps.changes.outputs.source == 'true'
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .next/static
            .next/standalone
          key: nextjs-build-${{ github.sha }}
          restore-keys: |
            nextjs-build-

      - name: 🔍 Verify files before upload
        if: steps.changes.outputs.source == 'true'
        run: |
          echo "Files in .next directory:"
          find .next -type f | head -10
          echo "Total files in .next:"
          find .next -type f | wc -l

      - name: 📦 Upload build artifacts
        if: steps.changes.outputs.source == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .next/
          retention-days: 1
          if-no-files-found: warn

  static-analysis:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        check: [typecheck, lint]
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔬 Type Check
        if: matrix.check == 'typecheck'
        run: pnpm typecheck

      - name: 🔬 Lint & Format Check
        if: matrix.check == 'lint'
        run: pnpm lint

  security:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has-deps-changes == 'true' || github.event_name == 'schedule'
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔒 Security Audit
        run: pnpm audit --audit-level moderate

      - name: 🛡️ Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  performance:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has-source-changes == 'true'
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: 🏗️ Rebuild if no artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "No build artifacts found, rebuilding..."
            pnpm build
          else
            echo "Build artifacts found, using cached build"
          fi
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 🌐 Start Server
        run: pnpm start &
        env:
          PORT: 3000

      - name: ⏳ Wait for Server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: ⚡ Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ".lighthouserc.json"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  bundle-analysis:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has-source-changes == 'true'
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: 💾 Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: nextjs-build-${{ github.sha }}
          restore-keys: |
            nextjs-build-

      - name: 📊 Analyze Bundle
        run: pnpm analyze

      - name: 📈 Upload Bundle Analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: .next/analyze/
          retention-days: 30

  accessibility:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has-source-changes == 'true'
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: 🏗️ Rebuild if no artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "No build artifacts found, rebuilding..."
            pnpm build
          else
            echo "Build artifacts found, using cached build"
          fi
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 🌐 Start Server
        run: pnpm start &
        env:
          PORT: 3000

      - name: ⏳ Wait for Server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: ♿ Accessibility Testing
        run: |
          npx pa11y http://localhost:3000 \
            --standard WCAG2AA \
            --reporter json > accessibility-report.json || true
          npx pa11y http://localhost:3000 \
            --standard WCAG2AA \
            --reporter cli

      - name: 📋 Upload Accessibility Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: accessibility-report.json
          retention-days: 30
